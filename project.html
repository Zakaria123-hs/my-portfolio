<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .project-container {
      max-width: 900px;
      background: #1e1e1e;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      overflow: hidden;
      animation: fadeIn 0.6s ease;
    }

    img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .project-container:hover img {
      transform: scale(1.05);
    }

    .project-content {
      padding: 30px;
    }

    .project-content h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #00bcd4;
    }

    .project-content p {
      line-height: 1.7;
      font-size: 1rem;
      color: #ddd;
    }

    .project-links {
      margin-top: 25px;
      display: flex;
      gap: 15px;
    }

    .project-links a {
      text-decoration: none;
      background: #00bcd4;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .project-links a:hover {
      background: #0097a7;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="project-container">
     <div class="project-container">
        <img id="project-img" src="" alt="Project Image">
        <h1 id="project-title"></h1>
        <p id="project-description"></p>

      <div class="project-links">
        <a href="index.html">⬅ Back to Portfolio</a>
        <a href="https://github.com/yourusername/web-market" target="_blank">🔗 View on GitHub</a>
      </div>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const projectName = params.get("project");

    const img = document.getElementById("project-img");
    const title = document.getElementById("project-title");
    const desc = document.getElementById("project-description");

    const projects = {
      market: {
        title: "Web Market Project",
        img: "picture/pic-market.png",
        desc: "This e-commerce web app lets users browse products, add them to a cart, and simulate purchases. Built with HTML, CSS, and JavaScript."
      },
      task: {
        title: "Task Manager",
        img: "picture/pic-task.png",
        desc: "A task management app to organize your daily activities. You can add, edit, and delete tasks with a clean UI."
      },
      cart: {
        title: "Shopping Cart",
        img: "picture/pic-cart.png",
        desc: "An interactive shopping cart system with live updates and total calculation using JavaScript DOM manipulation."
      }
    };

    
    if (projects[projectName]) {
      img.src = projects[projectName].img;
      title.textContent = projects[projectName].title;
      desc.textContent = projects[projectName].desc;
    } else {
      title.textContent = "Project not found 😢";
      desc.textContent = "Please go back and choose a valid project.";
    }
    console.log(projectName)
  </script>
</body>
</html>
